<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shubham Shinde | Certification</title><!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #1c1c1c);
        background-size: 400% 400%;
        animation: gradientBG 10s ease infinite;
        color: #fff;
    }

    @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .card {
        background: rgba(255, 255, 255, 0.08);
        padding: 50px 40px;
        border-radius: 25px;
        text-align: center;
        backdrop-filter: blur(15px);
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        transition: 0.4s ease;
        max-width: 400px;
        width: 90%;
    }

    .card:hover {
        transform: translateY(-10px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
    }

    h1 {
        font-size: 30px;
        font-weight: 700;
        margin-bottom: 10px;
        letter-spacing: 1px;
    }

    .subtitle {
        font-size: 15px;
        opacity: 0.8;
        margin-bottom: 30px;
    }

    .badge-wrapper {
        display: flex;
        justify-content: center;
        margin-bottom: 30px;
    }

    .btn {
        display: inline-block;
        padding: 10px 25px;
        border-radius: 30px;
        text-decoration: none;
        color: #fff;
        border: 1px solid rgba(255,255,255,0.4);
        transition: 0.3s ease;
    }

    .btn:hover {
        background: #ffffff;
        color: #000;
    }

    footer {
        margin-top: 25px;
        font-size: 13px;
        opacity: 0.6;
    }

    @media(max-width: 480px) {
        h1 { font-size: 24px; }
        .card { padding: 35px 25px; }
    }

</style>

</head>
<body><div class="card">
    <h1>Shubham Shinde</h1>
    <p class="subtitle">Professional Certification Badge</p>

    <div class="badge-wrapper">
        <div data-iframe-width="150" data-iframe-height="270"
            data-share-badge-id="edff0e74-4bd8-4484-8b3b-945b4c92c08b"
            data-share-badge-host="https://www.credly.com"></div>
    </div>

    <a href="https://www.credly.com" target="_blank" class="btn">View on Credly</a>

    <footer>
        © 2026 Shubham Shinde | Built with ❤️
    </footer>
</div>

<script type="text/javascript" async
    src="https://cdn.credly.com/assets/utilities/embed.js"></script>

</body>
</html>
